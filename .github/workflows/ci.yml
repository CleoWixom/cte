name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Core + server: compile check & tests ─────────────────────────────────
  test:
    name: Test (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # Check only non-WASM crates (wasm crate is checked in the wasm job)
      - name: Check core
        run: cargo check -p trieval-core --all-targets

      - name: Check server
        run: cargo check -p trieval-server --all-targets
        # SERVER: no DATABASE_URL needed because we use query_as (no macros)

      - name: Run core unit tests
        run: cargo test -p trieval-core --lib -- --nocapture

  # ── WASM build ────────────────────────────────────────────────────────────
  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/public/wasm --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: trieval-wasm
          path: web/public/wasm/
          retention-days: 7

  # ── Frontend build ────────────────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: wasm
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: trieval-wasm
          path: web/public/wasm/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: trieval-web
          path: web/dist/
          retention-days: 7

  # ── Docker build ──────────────────────────────────────────────────────────
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: trieval-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
