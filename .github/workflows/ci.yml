name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Core + server: check, test ────────────────────────────────────────────
  test:
    name: Test (Rust)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4-alpine
        env:
          POSTGRES_DB: trieval_test
          POSTGRES_USER: trieval
          POSTGRES_PASSWORD: trieval
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U trieval"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgres://trieval:trieval@localhost:5432/trieval_test

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features rustls,postgres

      - name: Run migrations
        run: sqlx migrate run --source migrations

      - name: Check (no compile errors)
        run: cargo check --workspace --all-targets

      - name: Run tests
        run: cargo test --workspace --lib -- --nocapture

  # ── WASM build ────────────────────────────────────────────────────────────
  wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: wasm-pack build crates/wasm --target web --out-dir ../../web/src/wasm --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: trieval-wasm
          path: web/src/wasm/
          retention-days: 7

  # ── Frontend build ────────────────────────────────────────────────────────
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: wasm
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM
        uses: actions/download-artifact@v4
        with:
          name: trieval-wasm
          path: web/src/wasm/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        working-directory: web
        run: npm ci

      - name: Build
        working-directory: web
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: trieval-web
          path: web/dist/
          retention-days: 7

  # ── Docker build (server) ─────────────────────────────────────────────────
  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push on PRs/forks)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: trieval-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
